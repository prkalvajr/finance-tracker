<div class="grid-wrapper">
  <div class="grid-filter-slot">
    <ng-content select="[gridFilters]" />
  </div>

  <div class="grid-table-container" [class.loading]="loading()">
    @if (loading()) {
      <div class="grid-spinner-overlay">
        <mat-spinner diameter="36" />
      </div>
    }

    <table mat-table [dataSource]="rows()" matSort (matSortChange)="onSortChange($event)">
      @for (col of columns(); track col.key) {
        <ng-container [matColumnDef]="col.key">
          <th mat-header-cell *matHeaderCellDef [mat-sort-header]="col.sortable ? col.key : ''" [disabled]="!col.sortable">
            {{ col.label }}
          </th>
          <td mat-cell *matCellDef="let row">
            @if (col.template) {
              <ng-container [ngTemplateOutlet]="col.template" [ngTemplateOutletContext]="{ $implicit: row }" />
            } @else {
              {{ getCell(col, row) }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="columnKeys()"></tr>
      <tr mat-row *matRowDef="let row; columns: columnKeys()"></tr>

      <tr class="mat-row grid-empty-row" *matNoDataRow>
        <td [colSpan]="columnKeys().length" class="grid-empty-cell">
          No transactions yet - add your first one.
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="_pageSize"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (page)="onPageChange($event)"
      aria-label="Select page"
    />
  </div>
</div>
