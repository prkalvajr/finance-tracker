<mat-toolbar class="brand-toolbar">
  <div class="toolbar-inner">
    <a routerLink="/home" class="brand" aria-label="Finance Tracker home">
      <span class="brand-mark">FT</span>
      <span class="brand-text">Finance Tracker</span>
    </a>

    @if (currentUser()) {
      <nav class="nav-links" aria-label="Primary navigation">
        <a
          mat-button
          routerLink="/home"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Home
        </a>
        <a
          mat-button
          routerLink="/profile"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Profile
        </a>
      </nav>

      <button mat-stroked-button class="logout-button" type="button" (click)="logout()">
        Logout
      </button>
    }
  </div>
</mat-toolbar>

<main class="page-shell">
  <router-outlet />
</main>
