services:
  db:
    image: postgres:16
    container_name: finance-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5433:5432"
    volumes:
      - finance_tracker_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finance_tracker_data:
